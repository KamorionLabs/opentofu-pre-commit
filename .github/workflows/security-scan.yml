---
name: Security Scan

"on":
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [main]
  schedule:
    # Scan weekly on Wednesdays at 3 AM UTC
    - cron: '0 3 * * 3'

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/opentofu-pre-commit

jobs:
  security-scan:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        variant: [ubuntu, alpine, slim, azurelinux]

    steps:
      - name: Set image reference
        id: image-ref
        run: |
          VARIANT="${{ matrix.variant }}"
          IMG="${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}"
          if [ "$VARIANT" = "ubuntu" ]; then
            TAG="latest"
          else
            TAG="$VARIANT"
          fi
          echo "image-ref=${IMG,,}:${TAG}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-ref.outputs.image-ref }}
          format: 'sarif'
          output: trivy-${{ matrix.variant }}.sarif
          timeout: '10m'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}
